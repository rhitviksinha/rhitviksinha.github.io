    <style>
        /* layout */
        .imax-layout { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
        .imax-map-container { flex: 1 1 500px; position: relative; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.7); }
        .imax-sidebar { flex: 0 0 320px; min-width: 280px; }

        /* hover card */
        .imax-hover-card { position: absolute; width: 220px; background: rgba(0,0,0,.9); border: 1px solid rgba(255,255,255,.15); border-radius: 8px; padding: 12px 14px; pointer-events: none; z-index: 20; box-shadow: 0 8px 30px rgba(0,0,0,.5); }

        /* venue rows */
        .venue-row { background: rgba(0,0,0,.4); padding: 9px 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.06); border-left: 2px solid transparent; transition: all .12s; }
        .venue-row.active, .venue-row:hover { background: rgba(0,0,0,.6); }
        .venue-row.selected { background: rgba(0,0,0,.6); }
        .venue-row-name { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.8); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .venue-row.active .venue-row-name, .venue-row:hover .venue-row-name { color: #fff; }

        /* venue list */
        .imax-venue-list { border-radius: 8px; border: 1px solid rgba(255,255,255,.1); overflow: hidden; }

        /* SVG pin states */
        .pin-active-state, .pin-label { opacity: 0; pointer-events: none; }
        .venue-pin.active .pin-active-state, .venue-pin.active .pin-label { opacity: 1; }
        .venue-pin.active .pin-143-halo { opacity: 0; }
        .venue-pin.active .pin-dot { opacity: 1 !important; }

        @keyframes pin-pulse {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.5; }
        }
        .venue-pin.active .pin-pulse-ring { animation: pin-pulse 2s infinite; }

        /* responsive */
        @media (max-width: 860px) {
            .imax-sidebar { flex: 1 1 100%; }
        }
    </style>

</head>
